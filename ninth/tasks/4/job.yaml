apiVersion: batch/v1 
kind: Job 
metadata:
  name: problematic-job 
spec:
  backoffLimit: 1
  template:
    spec:
      containers:
      - name: busybox-container 
        image: busybox 
        command: ["/bin/sh"]
        args: ["-c", "echo exit; sleep 10; exit 1"]
      restartPolicy: OnFailure


