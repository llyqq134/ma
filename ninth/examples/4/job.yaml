apiVersion: batch/v1
kind: Job 
metadata:
  name: data-processing-job 
spec:
  template:
    spec:
      containers:
      - name: processor 
        image: alpine 
        command:
        - /bin/sh
        - -c 
        - | 
          echo Starting data process 
          for i in 1 2 3 4 5; do 
            echo Processing $i element >> /tmp/result.txt 
            sleep 2
          done 
          echo Processing complete >> /tmp/result.txt 
          cat /tmp/result.txt 
      restartPolicy: OnFailure

