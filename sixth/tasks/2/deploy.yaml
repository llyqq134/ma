apiVersion: apps/v1
kind: Deployment 
metadata:
  name: liveness-combined
spec:
  selector:
    matchLabels:
      app: liveness-combined
  template:
    metadata:
      labels: 
        app: liveness-combined 
    spec:
      containers:
      - name: app 
        image: nginx:1.25
        ports:
        - containerPort: 80
        command: ["sh", "-c", "sleep 30"]
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initilaySeconds: 30
          periodSeconds: 10
        readinessProbe: 
          httpGet:
            path: / 
            port: 80
          initilaySeconds: 5
          periodSeconds: 5

