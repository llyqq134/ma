apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web-statefulset
spec:
  selector:
    matchLabels:
      app: nginx-stateful 
  serviceName: "web-statefulset"
  replicas: 3 
  template:
    metadata:
      labels:
        app: nginx-stateful
    spec:
      containers:
      - name: nginx 
        image: nginx:1.25
        ports:
        - containerPort: 80
        volumeMounts:
        - name: www
          mountPath: /usr/share/nginx/html

        readinessProbe: 
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2 
          successThreshold: 1 
          failureThreshold: 3 

        livenessProbe: 
          tcpSocket:
            port: 80
          initialDelaySeconds: 15 
          periodSeconds: 20 
          timeoutSeconds: 2 
          failureThreshold: 3

  volumeClaimTemplates:
  - metadata:
      name: www
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi

