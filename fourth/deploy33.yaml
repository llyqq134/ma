apiVersion: apps/v1
kind: Deployment 
metadata:
  name: production-app
  labels:
    app: production 
    environment: staging
spec:
  replicas: 4 
  strategy:
    type: RollingUpdate
    rollingUpdate: 
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: 
      app: production 
  template:
    metadata:
      labels:
        app: production 
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.25
        resources:
          requests:
            cpu: "250m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
        ports:
        - containerPort: 80
