apiVersion: apps/v1
kind: Deployment
metadata: 
  name: rolling-app
  labels:
    app: webserver
    version: "1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 
  minReadySeconds: 10 
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
        version: "1.0"
    spec:
      containers:
      - name: web-container
        image: nginx:1.25
        ports:
        - containerPort: 80



