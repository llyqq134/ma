apiVersion: v1
kind: Service 
metadata:
  name: multi-app-external
spec:
  type: NodePort
  selector:
    app: multi-service-app
  ports:
  - name: web-external
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30090

  - name: api-external
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30091
