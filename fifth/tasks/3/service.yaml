apiVersion: v1
kind: Service 
metadata:
  name: frontend-service 
  labels:
    app: multi-service-app
spec:
  type: ClusterIP
  selector:
    app: multi-service-app
  ports:
  - name: nginx-port
    protocol: TCP
    port: 80
    targetPort: 80

---
apiVersion: v1
kind: Service 
metadata:
  name: backend-service
  labels: 
    app: multi-service-app
spec:
  type: ClusterIP
  selector:
    app: multi-service-app
  ports:
  - name: apache-port
    protocol: TCP
    port: 8080
    targetPort: 8080
