apiVersion: v1
kind: Service 
metadata:
  name: web-service 
spec:
  type: ClusterIP
  selector:
    app: multi-app
  ports:
  - name: nginx-port
    protocol: TCP
    port: 80
    targetPort: 80

---
apiVersion: v1
kind: Service 
metadata:
  name: api-service 
spec:
  type: ClusterIP
  selector:
    app: multi-app
  ports:
  - name: apache-port
    protocol: TCP
    port: 8080
    targetPort: 8080
