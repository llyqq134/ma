apiVersion: v1
kind: ConfigMap 
metadata:
  name: app-config 
data: 
  message: "Hello from configmap"

---

apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: web-app
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: web-app
  template:
    metadata:
      labels:
        app: web-app 
    spec: 
      containers:
      - name: nginx-container
        image: nginx:1.25
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume 
          mountPath: /usr/share/nginx/html 
      volumes: 
      - name: html-volume
        configMap: 
          name: app-config 
        items:
        - key: message 
          path: index.html 

---

apiVersion: v1
kind: Service 
metadata:
  name: web-service 
spec: 
  type: NodePort
  selector:
    app: web-app
  ports: 
  - port: 80
    nodePort: 30080

