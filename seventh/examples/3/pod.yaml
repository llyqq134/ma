apiVersion: v1
kind: Pod 
metadata: 
  name: configmap-volume-pod 
spec:
  containers:
  - name: test-container
    image: busybox
    command: ["/bin/sh"]
    args: ["-c", "sleep 3600"]
    volumeMounts:
    - name: config-volume 
      mountPath: /etc/app-config 
  volumes: 
  - name: config-volume 
    configMap:
      name: app-file-config
      items:
      - key: application.properties
        path: app.properties
      - key: config.ini
        path: settings.ini
