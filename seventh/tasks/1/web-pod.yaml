apiVersion: v1
kind: Pod 
metadata:
  name: web-pod 
spec:
  containers: 
  - name: test-container
    image: busybox
    env:
    - name: COLOR
      valueFrom:
        configMapKeyRef:
          name: app-config 
          key: APP_COLOR
    - name: APP_ENV
      valueFrom: 
        configMapKeyRef: 
          name: app-config 
          key: APP_ENV
