apiVersion: v1
kind: Pod 
metadata:
  name: app-pod 
spec:
  containers:
  - name: busybox-container
    image: busybox 
    command: ["/bin/sh"]
    args: ["-c", "sleep 3600"]
    env: 
    - name: LOG_LEVEL
      valueFrom: 
        configMapKeyRef: 
          name: app-config 
          key: log-level
    volumeMounts:
    - name: app-config 
      mountPath: /app/config/
  volumes: 
  - name: app-config
    configMap: 
      name: app-config
      items:
      - key: database.url
        path: db.properties
