apiVersion: v1
kind: Service
metadata:
  name: {{ include "webapp-chart.fullname" . }}
  labels:
    {{- include "webapp-chart.labels" . | nindent 4 }}
    environment: {{ .Values.labels.environment }}
    team: {{ .Values.labels.team }}
    {{- if .Values.extraLabels.enabled }}
    {{- range $key, $value := .Values.extraLabels.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}

spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.tergetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "webapp-chart.selectorLabels" . | nindent 4 }}
