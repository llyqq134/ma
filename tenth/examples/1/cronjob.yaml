apiVersion: batch/v1 
kind: CronJob
metadata:
  name: hello-cron 
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: busybox-container
            image: busybox 
            imagePullPolicy: IfNotPresent
            command:
            - sh 
            - -c 
            - |
              echo "date: $(date)"
          restartPolicy: OnFailure
